<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<title>BeautyAsist</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    -webkit-user-select: none; user-select: none; cursor: default;
  }
  .card {
    width: 100%; height: 100%;
    border-radius: 18px;
    background: linear-gradient(160deg, #fdf8f4 0%, #faf0ec 55%, #f6e7e2 100%);
    border: 1px solid rgba(114, 47, 55, 0.10);
    box-shadow: 0 24px 60px rgba(74, 27, 36, 0.28);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px; position: relative; overflow: hidden;
  }
  .glow {
    position: absolute; width: 340px; height: 340px; border-radius: 50%;
    background: radial-gradient(circle, rgba(183, 110, 121, 0.16) 0%, transparent 70%);
    top: -120px; right: -100px; pointer-events: none;
  }
  .logo {
    width: 84px; height: 84px; border-radius: 22px;
    box-shadow: 0 10px 28px rgba(114, 47, 55, 0.22);
    animation: rise .7s cubic-bezier(.22,1,.36,1) both;
  }
  .wordmark {
    font-size: 26px; font-weight: 600; letter-spacing: .04em; color: #722f37;
    animation: rise .7s .12s cubic-bezier(.22,1,.36,1) both;
  }
  .wordmark span { color: #b76e79; font-weight: 400; }
  .tagline {
    font-size: 12px; letter-spacing: .22em; text-transform: uppercase; color: #705a66;
    animation: rise .7s .22s cubic-bezier(.22,1,.36,1) both;
  }
  .loader {
    width: 168px; height: 3px; border-radius: 999px; overflow: hidden;
    background: rgba(114, 47, 55, 0.12); margin-top: 6px;
    animation: rise .7s .3s cubic-bezier(.22,1,.36,1) both;
  }
  .loader::before {
    content: ""; display: block; height: 100%; width: 40%;
    border-radius: 999px;
    background: linear-gradient(90deg, #722f37, #b76e79);
    animation: slide 1.15s ease-in-out infinite;
  }
  .status { font-size: 11px; color: #705a66; animation: rise .7s .34s both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    55%  { transform: translateX(180%); }
    100% { transform: translateX(420%); }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <img class="logo" src="logo.png" alt="" />
    <div class="wordmark">Beauty<span>Asist</span></div>
    <div class="tagline">Güzellik Merkezi Yönetimi</div>
    <div class="loader"></div>
    <div class="status">Panele bağlanılıyor…</div>
  </div>
</body>
</html>
